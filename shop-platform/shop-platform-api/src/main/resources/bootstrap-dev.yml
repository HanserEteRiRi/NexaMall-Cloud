spring:
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: shop
        namespace: ${NACOS_NAMESPACE:}
        extension-configs:
          - data-id: shop-common.properties
            group: shop
            refresh: true
          - data-id: shop-redis.properties
            group: shop
            refresh: true
          - data-id: shop-rabbitmq.properties
            group: shop
            refresh: true
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: shop
        namespace: ${NACOS_NAMESPACE:}
    sentinel:
      enabled: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8080}
      filter:
        enabled: true

seata:
  service:
    vgroup-mapping:
      shop-platform-seata-service-group: default
    grouplist:
      default: ${SEATA_SERVER_ADDR:127.0.0.1:8091}
    disable-global-transaction: false

security:
  oauth2:
    client:
      clientId: shop-client
      clientSecret: ${OAUTH2_CLIENT_SECRET:shop-client}
      user-authorization-uri: http://localhost:8095/oauth/authorize
      access-token-uri: http://localhost:8095/oauth/token
      scope: app
    resource:
      id: shop-platform
      user-info-uri: http://shop-auth/oauth/principal
      prefer-token-info: true
      loadBalanced: true
